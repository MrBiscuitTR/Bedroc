<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />

		<!--
			Viewport: initial-scale=1, no user-scalable to prevent iOS double-tap zoom.
			We set font-size: 16px on all inputs in CSS to prevent iOS auto-zoom on focus.
		-->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>

		<!-- PWA / home screen -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Bedroc" />
		<meta name="application-name" content="Bedroc" />

		<!-- Theme color (browser chrome + Android task switcher) -->
		<meta name="theme-color" content="#0f1117" />

		<!-- Prevent phone number detection -->
		<meta name="format-detection" content="telephone=no" />

		<!-- PWA manifest -->
		<link rel="manifest" href="/manifest.webmanifest" />

		<!-- Apple touch icons (added in static/icons/) -->
		<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
