<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />

		<!--
			Viewport: initial-scale=1, no user-scalable to prevent iOS double-tap zoom.
			We set font-size: 16px on all inputs in CSS to prevent iOS auto-zoom on focus.
		-->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
		/>

		<!-- PWA / home screen -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Bedroc" />
		<meta name="application-name" content="Bedroc" />

		<!-- Theme color (browser chrome + Android task switcher) -->
		<meta name="theme-color" content="#16181f" />

		<!-- Prevent phone number detection -->
		<meta name="format-detection" content="telephone=no" />

		<!-- PWA manifest -->
		<link rel="manifest" href="/manifest.webmanifest" />

		<!-- Apple touch icons
		     iOS Safari uses the last matching <link> tag (or /apple-touch-icon.png at root).
		     Provide multiple sizes and a plain tag (no sizes attr) as the final fallback.
		     The root /apple-touch-icon.png is also present for devices that probe it directly. -->
		<link rel="apple-touch-icon" sizes="192x192" href="/icons/appicon-192.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />

		<!-- Favicons and other icons -->
		<link rel="icon" href="/icons/favicon.ico" sizes="any" />
		<link rel="icon" type="image/png" sizes="16x16" href="/icons/appicon-16.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/icons/appicon-32.png" />
		<link rel="icon" type="image/png" sizes="64x64" href="/icons/appicon-64.png" />
		<link rel="icon" type="image/png" sizes="96x96" href="/icons/appicon-96.png" />
		<link rel="icon" type="image/png" sizes="128x128" href="/icons/appicon-128.png" />
		<link rel="icon" type="image/png" sizes="256x256" href="/icons/appicon-256.png" />
		<link rel="icon" type="image/png" sizes="512x512" href="/icons/appicon-512.png" />
		%sveltekit.head%
		<!-- Apply saved theme before first paint to avoid flash -->
		<script>
			try {
				var t = localStorage.getItem('bedroc_theme');
				if (t) document.documentElement.setAttribute('data-theme', t);
			} catch(e) {}
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<!-- TEMPORARY DEBUG: remove after diagnosing iOS standalone gap -->
		<script>
			if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) {
				var d = document.createElement('div');
				d.id = 'dbg-overlay';
				d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,0.85);color:#0f0;font:11px/1.4 monospace;padding:6px 10px;z-index:99999;pointer-events:none;white-space:pre';
				document.body.appendChild(d);

				// Red bar at the very bottom of the viewport to visually mark where innerHeight ends
				var redBar = document.createElement('div');
				redBar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;height:4px;background:red;z-index:99999;pointer-events:none';
				document.body.appendChild(redBar);

				// Green bar at the bottom of the screen (using screen.height offset)
				var greenBar = document.createElement('div');
				greenBar.style.cssText = 'position:fixed;left:0;right:0;height:4px;background:lime;z-index:99998;pointer-events:none;bottom:0';
				document.body.appendChild(greenBar);

				function upd() {
					var cs = getComputedStyle(document.documentElement);
					var saiT = cs.getPropertyValue('--_sai-t') || '?';
					var saiB = cs.getPropertyValue('--_sai-b') || '?';
					var shell = document.querySelector('.app-shell') || document.querySelector('.auth-shell');
					var nav = document.querySelector('.bottom-nav');
					var mwrap = document.querySelector('.main-wrap');
					var navRect = nav ? nav.getBoundingClientRect() : null;
					var mwrapRect = mwrap ? mwrap.getBoundingClientRect() : null;
					var shellRect = shell ? shell.getBoundingClientRect() : null;
					var navCS = nav ? getComputedStyle(nav) : null;

					// Also measure the visualViewport if available
					var vv = window.visualViewport;
					var vvInfo = vv ? ('vv: h=' + Math.round(vv.height) + ' offT=' + Math.round(vv.offsetTop) + ' pgT=' + Math.round(vv.pageTop)) : 'vv: N/A';

					d.textContent =
						'scr:' + screen.height + ' inner:' + window.innerHeight +
						' dpr:' + window.devicePixelRatio +
						'\n' + vvInfo +
						'\nshell: ' + (shellRect ? 'b=' + Math.round(shellRect.bottom) + ' h=' + Math.round(shellRect.height) : 'NONE') +
						'\nnav: ' + (navRect ? 'b=' + Math.round(navRect.bottom) + ' h=' + Math.round(navRect.height) + ' pb=' + (navCS ? navCS.paddingBottom : '?') : 'NONE') +
						'\nsai: t=' + saiT + ' b=' + saiB +
						'\nRED bar = position:fixed;bottom:0';
				}
				var s = document.createElement('style');
				s.textContent = ':root{--_sai-t:env(safe-area-inset-top,0px);--_sai-b:env(safe-area-inset-bottom,0px)}';
				document.head.appendChild(s);
				setInterval(upd, 1000);
			}
		</script>
	</body>
</html>
